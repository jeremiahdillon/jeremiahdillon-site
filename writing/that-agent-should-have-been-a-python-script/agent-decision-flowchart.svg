<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="100%" role="img" aria-label="Decision flowchart: Build an agent, or just write a script? Three questions resolve to one of three shapes — just a script, a script with one model call, or a full agent.">
  <title>Build an agent, or just write a script?</title>
  <desc>A decision flowchart. Question 1: Can you draw the whole flowchart in advance? If no, build a full agent. If yes, Question 2: Does any step need judgment no rule can capture? If no, just write a script. If yes, Question 3: Is it exactly one fuzzy step with deterministic plumbing around it? If yes, a script with a single model call. If no, a full agent. Both no paths lead to the same full agent.</desc>

  <style>
    .ttl  { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; fill: #1B2A4A; }
    .sub  { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-style: italic; fill: #5B6473; }
    .q    { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #1B2A4A; }
    .qnum { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; fill: #FFFFFF; }
    .ct   { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; fill: #1B2A4A; }
    .cs   { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #5B6473; }
    .ctd  { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; fill: #FFFFFF; }
    .csd  { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #C9CEF5; }
    .br   { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; fill: #4F46E5; letter-spacing: .04em; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9AA3B2"/>
    </marker>
  </defs>

  <!-- Opaque white background -->
  <rect x="0" y="0" width="1000" height="470" fill="#FFFFFF"/>

  <!-- Heading -->
  <text class="ttl" x="500" y="42" text-anchor="middle" font-size="26">Build an agent, or just write a script?</text>
  <text class="sub" x="500" y="68" text-anchor="middle" font-size="14">You're about to build an agent. Pause and ask:</text>

  <!-- Connectors (under boxes) -->
  <!-- spine: Q1 -> Q2 (YES) -->
  <line x1="500" y1="176" x2="500" y2="228" stroke="#9AA3B2" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="br" x="518" y="206" font-size="12">YES</text>
  <!-- spine: Q2 -> Q3 (YES) -->
  <line x1="500" y1="306" x2="500" y2="358" stroke="#9AA3B2" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="br" x="518" y="336" font-size="12">YES</text>

  <!-- Q1 -> Full agent (NO, down into top) -->
  <polyline points="650,138 845,138 845,226" fill="none" stroke="#9AA3B2" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="br" x="745" y="129" font-size="12" text-anchor="middle">NO</text>
  <!-- Q3 -> Full agent (NO, up into bottom) -->
  <polyline points="650,404 845,404 845,310" fill="none" stroke="#9AA3B2" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="br" x="745" y="395" font-size="12" text-anchor="middle">NO</text>
  <!-- Q2 -> Just a script (NO) -->
  <line x1="350" y1="268" x2="282" y2="268" stroke="#9AA3B2" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="br" x="310" y="258" font-size="12" text-anchor="middle">NO</text>
  <!-- Q3 -> Script + one model call (YES) -->
  <line x1="350" y1="404" x2="282" y2="404" stroke="#9AA3B2" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="br" x="310" y="394" font-size="12" text-anchor="middle">YES</text>

  <!-- Question 1 -->
  <rect x="350" y="100" width="300" height="76" rx="12" fill="#FFFFFF" stroke="#C9CDEE" stroke-width="1.6"/>
  <circle cx="350" cy="100" r="14" fill="#4F46E5"/>
  <text class="qnum" x="350" y="105" text-anchor="middle" font-size="14">1</text>
  <text class="q" x="500" y="134" text-anchor="middle" font-size="15">Can you draw the whole</text>
  <text class="q" x="500" y="156" text-anchor="middle" font-size="15">flowchart in advance?</text>

  <!-- Question 2 -->
  <rect x="350" y="230" width="300" height="76" rx="12" fill="#FFFFFF" stroke="#C9CDEE" stroke-width="1.6"/>
  <circle cx="350" cy="230" r="14" fill="#4F46E5"/>
  <text class="qnum" x="350" y="235" text-anchor="middle" font-size="14">2</text>
  <text class="q" x="500" y="264" text-anchor="middle" font-size="15">Does any step need judgment</text>
  <text class="q" x="500" y="286" text-anchor="middle" font-size="15">no rule can capture?</text>

  <!-- Question 3 -->
  <rect x="350" y="360" width="300" height="88" rx="12" fill="#FFFFFF" stroke="#C9CDEE" stroke-width="1.6"/>
  <circle cx="350" cy="360" r="14" fill="#4F46E5"/>
  <text class="qnum" x="350" y="365" text-anchor="middle" font-size="14">3</text>
  <text class="q" x="500" y="397" text-anchor="middle" font-size="15">Is it exactly one fuzzy step, with</text>
  <text class="q" x="500" y="419" text-anchor="middle" font-size="15">deterministic plumbing around it?</text>

  <!-- Leaf: Just a script (lightest) -->
  <rect x="40" y="228" width="230" height="80" rx="12" fill="#FFFFFF" stroke="#4F46E5" stroke-width="2"/>
  <text class="ct" x="155" y="263" text-anchor="middle" font-size="16">Just a script</text>
  <text class="cs" x="155" y="285" text-anchor="middle" font-size="12">No model in the loop.</text>

  <!-- Leaf: Script + one model call (medium) -->
  <rect x="40" y="364" width="230" height="80" rx="12" fill="#ECEEFB" stroke="#4F46E5" stroke-width="1.6"/>
  <text class="ct" x="155" y="399" text-anchor="middle" font-size="15">Script + one model call</text>
  <text class="cs" x="155" y="421" text-anchor="middle" font-size="12">A single model call in the loop.</text>

  <!-- Leaf: Full agent (heaviest, single node, same size) -->
  <rect x="730" y="228" width="230" height="80" rx="12" fill="#1B2A4A"/>
  <text class="ctd" x="845" y="263" text-anchor="middle" font-size="16">Full agent</text>
  <text class="csd" x="845" y="285" text-anchor="middle" font-size="12">The model runs the loop.</text>
</svg>
